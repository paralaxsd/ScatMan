name: publish-tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for NuGet trusted publishing (OIDC)

jobs:
  publish:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}

      - name: 'Login to NuGet.org'
        id: login
        uses: NuGet/login@v1
        with:
          user: mtopf

      - name: 'Run: Push'
        run: ./build.cmd Push
        env:
          NuGetApiKey: ${{ steps.login.outputs.NUGET_API_KEY }}
